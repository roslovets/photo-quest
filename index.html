<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="description"
          content="A simple offline photo quest for kids: hide printable cards, add photos, and let children find them.">
    <meta name="application-name" content="Photo Quest">
    <meta name="robots" content="index,follow">
    <meta name="theme-color" content="#6c5ce7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Photo Quest">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Photo Quest</title>
    <link rel="canonical" href="https://roslovets.github.io/photo-quest/">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="en_US">
    <meta property="og:site_name" content="Photo Quest">
    <meta property="og:title" content="Photo Quest">
    <meta property="og:description"
          content="A simple offline photo quest for kids: hide printable cards, add photos, and let children find them.">
    <meta property="og:url" content="https://roslovets.github.io/photo-quest/">
    <meta property="og:image" content="https://roslovets.github.io/photo-quest/og-image.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Photo Quest preview with printable quest cards">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Photo Quest">
    <meta name="twitter:description"
          content="A simple offline photo quest for kids: hide printable cards, add photos, and let children find them.">
    <meta name="twitter:image" content="https://roslovets.github.io/photo-quest/og-image.png">
    <meta name="twitter:image:alt" content="Photo Quest preview with printable quest cards">
    <style>
        :root {
            --bg1: #ffdd57;
            --bg2: #ff7eb3;
            --bg3: #7afcff;
            --card: rgba(255, 255, 255, 0.94);
            --text: #24304f;
            --muted: #667085;
            --primary: #6c5ce7;
            --primary-dark: #4b3bc9;
            --green: #00b894;
            --orange: #ff9f1a;
            --red: #ff4757;
            --shadow: 0 18px 45px rgba(36, 48, 79, 0.22);
            --radius: 28px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            min-height: 100%;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 20% 10%, rgba(255, 255, 255, 0.8) 0 8%, transparent 9%),
            radial-gradient(circle at 90% 20%, rgba(255, 255, 255, 0.55) 0 7%, transparent 8%),
            linear-gradient(135deg, var(--bg1), var(--bg2) 48%, var(--bg3));
            background-attachment: fixed;
        }

        body {
            padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom);
        }

        button, input {
            font: inherit;
        }

        button {
            border: 0;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }

        button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .app {
            width: min(680px, 100%);
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px 0;
        }

        .screen {
            width: 100%;
        }

        .panel {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 22px;
        }

        .hero {
            text-align: center;
            padding: 28px 20px;
        }

        .logo {
            width: 92px;
            height: 92px;
            margin: 0 auto 14px;
            display: grid;
            place-items: center;
            border-radius: 31px;
            font-size: 52px;
            background: linear-gradient(135deg, #fff176, #ff8a65, #ce93d8);
            box-shadow: 0 16px 30px rgba(108, 92, 231, 0.25);
            transform: rotate(-4deg);
        }

        h1, h2, p {
            margin-top: 0;
        }

        h1 {
            margin-bottom: 8px;
            font-size: clamp(34px, 10vw, 56px);
            line-height: 0.95;
            letter-spacing: -0.04em;
        }

        h2 {
            margin-bottom: 10px;
            font-size: clamp(26px, 7vw, 40px);
            line-height: 1;
            letter-spacing: -0.03em;
        }

        .sub {
            color: var(--muted);
            font-size: 18px;
            line-height: 1.35;
            margin-bottom: 22px;
        }

        .tiny {
            margin: 10px 0 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.35;
            font-weight: 700;
        }

        .actions {
            display: grid;
            gap: 12px;
            margin-top: 16px;
        }

        .btn {
            display: grid;
            place-items: center;
            width: 100%;
            min-height: 62px;
            border-radius: 22px;
            padding: 15px 18px;
            font-weight: 900;
            font-size: 21px;
            line-height: 1.1;
            text-align: center;
            text-decoration: none;
            color: white;
            background: var(--primary);
            box-shadow: 0 10px 0 var(--primary-dark), 0 16px 26px rgba(108, 92, 231, 0.24);
        }

        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 var(--primary-dark);
        }

        .btn.secondary {
            color: var(--text);
            background: #ffffff;
            box-shadow: 0 10px 0 #d9e2f2;
        }

        .btn.green {
            background: var(--green);
            box-shadow: 0 10px 0 #008d72;
        }

        .btn.orange {
            background: var(--orange);
            box-shadow: 0 10px 0 #d87800;
        }

        .btn.red {
            background: var(--red);
            box-shadow: 0 10px 0 #c92f3c;
        }

        .btn.small {
            min-height: 44px;
            border-radius: 16px;
            padding: 10px 13px;
            font-size: 15px;
            box-shadow: none;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .icon-btn {
            flex: 0 0 auto;
            width: 48px;
            height: 48px;
            border-radius: 18px;
            display: grid;
            place-items: center;
            background: #ffffff;
            color: var(--text);
            font-size: 24px;
            box-shadow: 0 7px 0 #d9e2f2;
        }

        .icon-btn:active {
            transform: translateY(4px);
            box-shadow: 0 3px 0 #d9e2f2;
        }

        .counter {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border-radius: 999px;
            padding: 9px 14px;
            background: rgba(108, 92, 231, 0.12);
            color: var(--primary-dark);
            font-weight: 900;
            font-size: 16px;
        }

        .add-card {
            margin: 14px 0;
            padding: 18px;
            border-radius: 24px;
            background: linear-gradient(135deg, #fff5bd, #ffd6e7);
            border: 3px dashed rgba(108, 92, 231, 0.35);
            text-align: center;
        }

        .next-num {
            width: 78px;
            height: 78px;
            border-radius: 26px;
            display: grid;
            place-items: center;
            margin: 0 auto 12px;
            font-size: 40px;
            font-weight: 1000;
            color: #fff;
            background: linear-gradient(135deg, #6c5ce7, #ff4757);
            box-shadow: 0 12px 22px rgba(108, 92, 231, 0.22);
            transform: rotate(3deg);
        }

        .route {
            display: grid;
            gap: 12px;
            margin-top: 16px;
        }

        .photo-row {
            display: grid;
            grid-template-columns: 78px 1fr;
            gap: 12px;
            align-items: center;
            padding: 10px;
            background: #fff;
            border-radius: 22px;
            box-shadow: 0 8px 20px rgba(36, 48, 79, 0.08);
        }

        .thumb {
            width: 78px;
            height: 78px;
            border-radius: 18px;
            object-fit: cover;
            background: #eef2ff;
        }

        .row-title {
            font-weight: 1000;
            font-size: 18px;
            margin-bottom: 8px;
        }

        .row-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .empty {
            padding: 20px;
            text-align: center;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.6);
            color: var(--muted);
            font-weight: 800;
        }

        .game-panel {
            min-height: calc(100vh - 36px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 14px;
        }

        .game-head {
            text-align: center;
        }

        .game-title {
            margin: 6px 0 8px;
            font-size: clamp(28px, 8vw, 48px);
            line-height: 1;
            font-weight: 1000;
            letter-spacing: -0.04em;
        }

        .game-number {
            display: inline-grid;
            place-items: center;
            min-width: 92px;
            min-height: 92px;
            padding: 8px 18px;
            border-radius: 30px;
            color: #fff;
            font-weight: 1000;
            font-size: 54px;
            background: linear-gradient(135deg, #00b894, #00cec9);
            box-shadow: 0 12px 0 #009b86;
            transform: rotate(-3deg);
        }

        .photo-frame {
            overflow: hidden;
            border: 10px solid #fff;
            border-radius: 28px;
            background: #fff;
            box-shadow: 0 18px 35px rgba(36, 48, 79, 0.2);
            flex: 1;
            min-height: 260px;
            max-height: 60vh;
        }

        .game-photo {
            width: 100%;
            height: 100%;
            min-height: 260px;
            max-height: 60vh;
            display: block;
            object-fit: cover;
        }

        .finish {
            text-align: center;
        }

        .party {
            font-size: 82px;
            margin-bottom: 4px;
        }

        .message {
            position: fixed;
            left: 14px;
            right: 14px;
            bottom: calc(14px + env(safe-area-inset-bottom));
            z-index: 10;
            max-width: 640px;
            margin: 0 auto;
            padding: 14px 16px;
            border-radius: 20px;
            background: #24304f;
            color: #fff;
            font-weight: 800;
            text-align: center;
            box-shadow: 0 12px 30px rgba(36, 48, 79, 0.25);
            display: none;
        }

        .message.show {
            display: block;
        }

        .hidden {
            display: none !important;
        }

        .fallback-warning {
            margin-top: 16px;
            padding: 14px;
            border-radius: 18px;
            background: #fff3cd;
            color: #5f4300;
            font-weight: 800;
            line-height: 1.35;
        }


        .prep-photo {
            width: 100%;
            max-height: 54vh;
            min-height: 260px;
            object-fit: cover;
            display: block;
            border-radius: 26px;
            border: 10px solid #fff;
            box-shadow: 0 18px 35px rgba(36, 48, 79, 0.2);
            background: #fff;
        }

        .remaining-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 12px;
        }

        .place-choice {
            position: relative;
            padding: 0;
            border-radius: 18px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 8px 18px rgba(36, 48, 79, 0.12);
            border: 4px solid transparent;
        }

        .place-choice.active {
            border-color: #00b894;
        }

        .place-choice img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
        }

        .place-badge {
            position: absolute;
            left: 7px;
            top: 7px;
            min-width: 30px;
            height: 30px;
            padding: 0 8px;
            border-radius: 999px;
            display: grid;
            place-items: center;
            background: #24304f;
            color: #fff;
            font-weight: 1000;
            font-size: 14px;
        }

        .prep-note {
            margin-top: 12px;
            padding: 12px;
            border-radius: 18px;
            background: rgba(108, 92, 231, 0.12);
            color: var(--primary-dark);
            font-weight: 900;
            line-height: 1.3;
            text-align: center;
        }

        @media (max-width: 420px) {
            body {
                padding-left: 10px;
                padding-right: 10px;
            }

            .panel {
                padding: 17px;
                border-radius: 24px;
            }

            .btn {
                min-height: 58px;
                border-radius: 20px;
                font-size: 19px;
            }

            .photo-row {
                grid-template-columns: 68px 1fr;
            }

            .thumb {
                width: 68px;
                height: 68px;
            }

            .row-actions {
                grid-template-columns: 1fr;
            }

            .game-panel {
                min-height: calc(100vh - 28px);
            }
        }
    </style>
</head>
<body>
<main class="app">
    <section id="app" class="screen">
        <div class="panel hero">
            <div class="logo">🗺️</div>
            <h1>Photo<br>Quest</h1>
            <p class="sub">Loading app...</p>
            <noscript>
                <div class="fallback-warning">
                    JavaScript did not start. On iPhone, the file sometimes opens in the Files preview instead of as a
                    website.
                    Open the file in Safari or host it on a regular HTTPS hosting service.
                </div>
            </noscript>
        </div>
    </section>
</main>

<input id="cameraInput" class="hidden" type="file" accept="image/*" capture="environment">
<input id="galleryInput" class="hidden" type="file" accept="image/*" multiple>
<div id="message" class="message" role="status" aria-live="polite"></div>

<script>
    (function () {
        var STORAGE_PHOTOS = "kidsQuestPhotos_v2";
        var STORAGE_STEP = "kidsQuestCurrentStepIndex_v2";

        var app = document.getElementById("app");
        var cameraInput = document.getElementById("cameraInput");
        var galleryInput = document.getElementById("galleryInput");
        var messageBox = document.getElementById("message");

        var memoryStore = {};
        var storageWorks = testStorage();
        var photos = loadPhotos();
        var currentStepIndex = loadStep();
        var prepIndex = 0;
        var pendingReplaceIndex = null;
        var messageTimer = null;

        function testStorage() {
            try {
                var key = "__kids_quest_test__";
                window.localStorage.setItem(key, "1");
                window.localStorage.removeItem(key);
                return true;
            } catch (e) {
                return false;
            }
        }

        function storageGet(key) {
            try {
                if (storageWorks) return window.localStorage.getItem(key);
                return memoryStore[key] || null;
            } catch (e) {
                return memoryStore[key] || null;
            }
        }

        function storageSet(key, value, allowMemoryFallback) {
            try {
                if (storageWorks) {
                    window.localStorage.setItem(key, value);
                    return;
                }
            } catch (e) {
                if (!allowMemoryFallback) throw e;
            }
            memoryStore[key] = value;
        }

        function storageRemove(key, allowMemoryFallback) {
            try {
                if (storageWorks) window.localStorage.removeItem(key);
            } catch (e) {
                if (!allowMemoryFallback) throw e;
            }
            delete memoryStore[key];
        }

        function loadPhotos() {
            try {
                var raw = storageGet(STORAGE_PHOTOS);
                var parsed = raw ? JSON.parse(raw) : [];
                if (!Array.isArray(parsed)) return [];
                return parsed.filter(function (item) {
                    return item && item.imageDataUrl;
                });
            } catch (e) {
                return [];
            }
        }

        function loadStep() {
            try {
                var value = Number(storageGet(STORAGE_STEP) || "0");
                return isFinite(value) && value >= 0 ? value : 0;
            } catch (e) {
                return 0;
            }
        }

        function saveStep() {
            storageSet(STORAGE_STEP, String(currentStepIndex), true);
        }

        function savePhotos(nextPhotos) {
            storageSet(STORAGE_PHOTOS, JSON.stringify(nextPhotos), false);
            photos = nextPhotos;
        }

        function resetProgress() {
            currentStepIndex = 0;
            saveStep();
        }

        function showMessage(text) {
            clearTimeout(messageTimer);
            messageBox.textContent = text;
            messageBox.className = "message show";
            messageTimer = setTimeout(function () {
                messageBox.className = "message";
            }, 2600);
        }

        function setScreen(html) {
            app.innerHTML = html;
            try {
                window.scrollTo(0, 0);
            } catch (e) {
            }
        }

        function storageNotice() {
            if (storageWorks) {
                return "All photos are stored only in this browser on this device.";
            }
            return "Warning: the browser did not allow access to localStorage. The interface works, but photos may not be saved after closing the file.";
        }

        window.renderHome = function () {
            var hasPhotos = photos.length > 0;
            var isFinished = hasPhotos && currentStepIndex >= photos.length;
            var buttons = "";

            if (hasPhotos) {
                buttons += '<button class="btn green" onclick="startPreparation()">Prepare game</button>';
            }
            if (hasPhotos && !isFinished) {
                buttons += '<button class="btn orange" onclick="renderGame()">Continue game</button>';
            }
            buttons += '<button class="btn" onclick="renderSettings()">' + (hasPhotos ? "Set up photos" : "Create quest") + '</button>';
            buttons += '<a class="btn secondary" href="./cards.png" target="_blank" rel="noopener">Print cards</a>';

            setScreen(
                '<div class="panel hero">' +
                '<div class="logo">🗺️</div>' +
                '<h1>Photo<br>Quest</h1>' +
                '<p class="sub">' + (hasPhotos ? 'Saved photos: <b>' + photos.length + '</b>' : 'Add photos of the places, then the app will help you lay out the cards.') + '</p>' +
                '<div class="actions">' + buttons + '</div>' +
                '<p class="tiny">' + storageNotice() + '</p>' +
                '</div>'
            );
        };

        window.renderSettings = function () {
            var nextNumber = photos.length + 1;
            var routeHtml = "";

            if (photos.length) {
                for (var i = 0; i < photos.length; i++) {
                    routeHtml +=
                        '<div class="photo-row">' +
                        '<img class="thumb" src="' + photos[i].imageDataUrl + '" alt="Card photo ' + (i + 1) + '">' +
                        '<div>' +
                        '<div class="row-title">Card #' + (i + 1) + '</div>' +
                        '<div class="row-actions">' +
                        '<button class="btn small orange" onclick="replacePhoto(' + i + ')">Replace</button>' +
                        '<button class="btn small red" onclick="deletePhoto(' + i + ')">Delete</button>' +
                        '</div>' +
                        '</div>' +
                        '</div>';
                }
            } else {
                routeHtml = '<div class="empty">No photos yet. Add the first place for card #1.</div>';
            }

            setScreen(
                '<div class="panel">' +
                '<div class="topbar">' +
                '<button class="icon-btn" onclick="renderHome()" aria-label="Back">←</button>' +
                '<div class="counter">Photos: ' + photos.length + '</div>' +
                '</div>' +
                '<h2>Quest setup</h2>' +
                '<p class="sub">Add photos in order. You can take a photo or choose one from the gallery.</p>' +
                '<div class="add-card">' +
                '<div class="next-num">' + nextNumber + '</div>' +
                '<button class="btn" onclick="takePhoto()">Take photo #' + nextNumber + '</button>' +
                '<button class="btn secondary" style="margin-top:12px;" onclick="choosePhoto()">Choose from gallery</button><p class="tiny">You can choose several photos from the gallery at once.</p>' +
                '</div>' +
                '<div class="actions">' +
                '<button class="btn green" ' + (photos.length ? "" : "disabled") + ' onclick="startPreparation()">Prepare game</button>' +
                '</div>' +
                '<h2 style="margin-top:24px;font-size:28px;">Route</h2>' +
                '<div class="route">' + routeHtml + '</div>' +
                (photos.length ? '<div class="actions"><button class="btn red" onclick="clearQuest()">Clear all photos</button></div>' : '') +
                '</div>'
            );
        };

        window.takePhoto = function () {
            pendingReplaceIndex = null;
            cameraInput.value = "";
            cameraInput.click();
        };

        window.choosePhoto = function () {
            pendingReplaceIndex = null;
            galleryInput.value = "";
            galleryInput.click();
        };

        window.replacePhoto = function (index) {
            pendingReplaceIndex = index;
            galleryInput.value = "";
            galleryInput.click();
        };

        function handlePhotoSelected(event) {
            var files = event.target.files ? Array.prototype.slice.call(event.target.files) : [];
            if (!files.length) return;

            // Replacement mode: use only the first selected photo.
            if (pendingReplaceIndex !== null) {
                compressImage(files[0], 900, 0.72).then(function (imageDataUrl) {
                    var nextPhotos = photos.slice();
                    nextPhotos[pendingReplaceIndex] = {
                        id: nextPhotos[pendingReplaceIndex].id,
                        imageDataUrl: imageDataUrl
                    };

                    try {
                        savePhotos(nextPhotos);
                    } catch (e) {
                        showMessage("The photo was not saved. There may not be enough space.");
                        return;
                    }

                    resetProgress();
                    pendingReplaceIndex = null;
                    window.renderSettings();
                    showMessage("Photo replaced!");
                }).catch(function () {
                    showMessage("Could not open the photo. Try another one.");
                });

                return;
            }

            // Add mode: append all selected photos in the selected order.
            compressMany(files, 900, 0.72).then(function (imageDataUrls) {
                if (!imageDataUrls.length) {
                    showMessage("Could not add the photo.");
                    return;
                }

                var nextPhotos = photos.slice();

                for (var i = 0; i < imageDataUrls.length; i++) {
                    nextPhotos.push({
                        id: "photo-" + Date.now() + "-" + i + "-" + Math.random().toString(16).slice(2),
                        imageDataUrl: imageDataUrls[i]
                    });
                }

                try {
                    savePhotos(nextPhotos);
                } catch (e) {
                    showMessage("The photos were not saved. Try choosing fewer photos.");
                    return;
                }

                resetProgress();
                window.renderSettings();

                if (imageDataUrls.length === 1) {
                    showMessage("Photo saved!");
                } else {
                    showMessage("Added photos: " + imageDataUrls.length);
                }
            }).catch(function () {
                showMessage("Could not open the photo. Try choosing fewer photos.");
            });
        }

        function compressMany(files, maxWidth, quality) {
            var chain = Promise.resolve([]);
            files.forEach(function (file) {
                chain = chain.then(function (results) {
                    return compressImage(file, maxWidth, quality).then(function (imageDataUrl) {
                        results.push(imageDataUrl);
                        return results;
                    });
                });
            });
            return chain;
        }

        function compressImage(file, maxWidth, quality) {
            return new Promise(function (resolve, reject) {
                var reader = new FileReader();

                reader.onerror = function () {
                    reject(new Error("read_error"));
                };
                reader.onload = function () {
                    var img = new Image();

                    img.onerror = function () {
                        reject(new Error("image_error"));
                    };
                    img.onload = function () {
                        var scale = Math.min(1, maxWidth / img.width);
                        var width = Math.max(1, Math.round(img.width * scale));
                        var height = Math.max(1, Math.round(img.height * scale));

                        var canvas = document.createElement("canvas");
                        canvas.width = width;
                        canvas.height = height;

                        var ctx = canvas.getContext("2d");
                        ctx.drawImage(img, 0, 0, width, height);

                        resolve(canvas.toDataURL("image/jpeg", quality));
                    };

                    img.src = reader.result;
                };

                reader.readAsDataURL(file);
            });
        }

        window.deletePhoto = function (index) {
            var ok = confirm("Delete the photo for card #" + (index + 1) + "?");
            if (!ok) return;

            var nextPhotos = [];
            for (var i = 0; i < photos.length; i++) {
                if (i !== index) nextPhotos.push(photos[i]);
            }

            try {
                savePhotos(nextPhotos);
            } catch (e) {
                showMessage("The change was not saved. Try again.");
                return;
            }

            resetProgress();
            window.renderSettings();
            showMessage("Photo deleted.");
        };

        window.clearQuest = function () {
            var ok = confirm("Delete all quest photos?");
            if (!ok) return;

            try {
                storageRemove(STORAGE_PHOTOS, false);
                storageRemove(STORAGE_STEP, true);
            } catch (e) {
                showMessage("The quest was not cleared. Try again.");
                return;
            }

            photos = [];
            currentStepIndex = 0;
            window.renderHome();
            showMessage("Quest cleared.");
        };

        window.startPreparation = function () {
            if (!photos.length) {
                showMessage("Add at least one photo first.");
                return;
            }

            prepIndex = 0;
            resetProgress();
            window.renderPreparation();
        };

        window.renderPreparation = function () {
            if (!photos.length) {
                window.renderSettings();
                return;
            }

            if (prepIndex >= photos.length) {
                window.renderPreparationDone();
                return;
            }

            var cardNumber = prepIndex + 1;
            var currentPhoto = photos[prepIndex];
            var choices = "";

            for (var i = prepIndex; i < photos.length; i++) {
                choices +=
                    '<button class="place-choice ' + (i === prepIndex ? "active" : "") + '" onclick="pickPrepPhoto(' + i + ')" aria-label="Choose place ' + (i + 1) + '">' +
                    '<img src="' + photos[i].imageDataUrl + '" alt="Remaining place ' + (i + 1) + '">' +
                    '<span class="place-badge">' + (i === prepIndex ? "✓" : (i + 1)) + '</span>' +
                    '</button>';
            }

            setScreen(
                '<div class="panel">' +
                '<div class="topbar">' +
                '<button class="icon-btn" onclick="renderHome()" aria-label="Home">⌂</button>' +
                '<div class="counter">Layout ' + cardNumber + ' of ' + photos.length + '</div>' +
                '</div>' +

                '<h2>Card #' + cardNumber + '</h2>' +

                '<img class="prep-photo" src="' + currentPhoto.imageDataUrl + '" alt="Place for card ' + cardNumber + '">' +

                '<div class="remaining-grid">' + choices + '</div>' +

                '<div class="actions">' +
                '<button class="btn green" onclick="confirmPrepStep()">Hidden! Next</button>' +
                '<button class="btn secondary" onclick="renderSettings()">Set up photos</button>' +
                '</div>' +
                '</div>'
            );
        };

        window.pickPrepPhoto = function (absoluteIndex) {
            if (absoluteIndex === prepIndex) return;

            var nextPhotos = photos.slice();
            var picked = nextPhotos.splice(absoluteIndex, 1)[0];
            nextPhotos.splice(prepIndex, 0, picked);

            try {
                savePhotos(nextPhotos);
            } catch (e) {
                showMessage("The route was not updated. Try again.");
                return;
            }

            window.renderPreparation();
        };

        window.confirmPrepStep = function () {
            prepIndex += 1;

            if (prepIndex >= photos.length) {
                window.renderPreparationDone();
            } else {
                window.renderPreparation();
            }
        };

        window.renderPreparationDone = function () {
            resetProgress();

            setScreen(
                '<div class="panel hero finish">' +
                '<div class="party">✅</div>' +
                '<h1>Everything is hidden!</h1>' +
                '<p class="sub">Now you can call the child and start the quest.</p>' +
                '<div class="actions">' +
                '<button class="btn green" onclick="startOver()">Start game</button>' +
                '<button class="btn secondary" onclick="startPreparation()">Lay out again</button>' +
                '<button class="btn secondary" onclick="renderSettings()">Set up photos</button>' +
                '</div>' +
                '</div>'
            );
        };

        window.startOver = function () {
            resetProgress();
            window.renderGame();
        };

        window.startGameFromSettings = function () {
            if (!photos.length) {
                showMessage("Add at least one photo first.");
                return;
            }

            resetProgress();
            window.renderGame();
        };

        window.renderGame = function () {
            if (!photos.length) {
                window.renderHome();
                return;
            }

            if (currentStepIndex >= photos.length) {
                window.renderFinish();
                return;
            }

            var photo = photos[currentStepIndex];
            var cardNumber = currentStepIndex + 1;

            setScreen(
                '<div class="panel game-panel">' +
                '<div class="game-head">' +
                '<div class="topbar">' +
                '<button class="icon-btn" onclick="renderHome()" aria-label="Home">⌂</button>' +
                '<div class="counter">Card ' + cardNumber + ' of ' + photos.length + '</div>' +
                '</div>' +
                '<div class="game-title">Find the card</div>' +
                '<div class="game-number">#' + cardNumber + '</div>' +
                '</div>' +
                '<div class="photo-frame">' +
                '<img class="game-photo" src="' + photo.imageDataUrl + '" alt="Photo of the place for card ' + cardNumber + '">' +
                '</div>' +
                '<button class="btn green" onclick="foundCard()">I found it!</button>' +
                '</div>'
            );
        };

        window.foundCard = function () {
            currentStepIndex += 1;
            saveStep();

            if (currentStepIndex >= photos.length) {
                window.renderFinish();
            } else {
                window.renderGame();
            }
        };

        window.renderFinish = function () {
            setScreen(
                '<div class="panel hero finish">' +
                '<div class="party">🎉</div>' +
                '<h1>Victory!</h1>' +
                '<p class="sub">You found all the cards!</p>' +
                '<div class="actions">' +
                '<button class="btn green" onclick="startPreparation()">Prepare game again</button>' +
                '<button class="btn secondary" onclick="renderSettings()">Set up photos</button>' +
                '</div>' +
                '</div>'
            );
        };

        cameraInput.addEventListener("change", handlePhotoSelected);
        galleryInput.addEventListener("change", handlePhotoSelected);

        if (currentStepIndex > photos.length) {
            resetProgress();
        }

        if ("serviceWorker" in navigator && window.location.protocol !== "file:") {
            window.addEventListener("load", function () {
                navigator.serviceWorker.register("./sw.js").catch(function () {
                    // The app still works online if registration is unavailable.
                });
            });
        }

        window.renderHome();
    })();
</script>
</body>
</html>
